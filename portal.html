<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <title>森林空間情報ポータル</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

  <!-- Pannellum -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum/build/pannellum.css">
  <meta name="theme-color" content="#2c3e50">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="label.css">

  <style>
.area-label {
  pointer-events: none !important;
}
.legend {
  background: white;
  padding: 8px;
  border: 1px solid #666;
  border-radius: 4px;
  max-height: 300px;
  overflow-y: auto;
}
.legend-toggle {
  background: #444;
  color: white;
  padding: 4px 8px;
  cursor: pointer;
  font-size: 12px;
  border-radius: 4px;
  margin-bottom: 4px;
  display: inline-block;
}

/* ★ フッターリンク（クレジット） */
#credit-link {
  position: fixed;
  bottom: 8px;
  right: 8px;
  background: rgba(255,255,255,0.85);
  padding: 4px 8px;
  border-radius: 4px;
  font-size: 12px;
  z-index: 9999;
  box-shadow: 0 0 4px rgba(0,0,0,0.2);
}
#credit-link a {
  color: #0066cc;
  text-decoration: none;
}
#credit-link a:hover {
  text-decoration: underline;
}

/* ★ 右下インフォグラフィック画像（地図の上に表示） */
#portal-info-img {
  position: fixed;
  bottom: 60px; /* フッターリンクより少し上 */
  right: 8px;
  z-index: 9999;
}
#portal-info-img img {
  width: 180px;
  opacity: 0.95;
  border-radius: 6px;
  box-shadow: 0 0 6px rgba(0,0,0,0.3);
  cursor: pointer;
  transition: opacity 0.2s;
}
#portal-info-img img:hover {
  opacity: 1.0;
}
  </style>

</head>
<body>
  <div id="header">
    <button id="menuBtn" class="mobile-only">≡</button>
    森林空間情報ポータル／令和６年能登半島地震関連データポータル
  </div>
  <div id="container">

    <!-- 地図 -->
    <div id="map">
      <button id="locateBtn" class="locate-btn"></button>
    </div>
  </div>

  <!-- ★ フッターリンク（クレジットページへ） -->
  <div id="credit-link">
    <a href="portalcredit.html" target="_blank">データ出典・利用規約</a>
  </div>

  <!-- ★ 右下インフォグラフィック画像（地図の上に表示） -->
  <div id="portal-info-img">
    <img src="img/portalinfo.png" alt="このページの使い方">
  </div>

  <!-- JSライブラリ（順番厳守） -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://unpkg.com/leaflet.vectorgrid/dist/Leaflet.VectorGrid.bundled.js"></script>

  <!-- ★ 初期表示レイヤー設定-->
<script>
  window.defaultBaseLayer = "gsi";      // ベースレイヤー
  window.defaultOverlayCS = false;      // CS立体図（透過）を初期表示で OFF
</script>
  
<script>

/* ===== ベースレイヤー定義 ===== */
const layerGSIstd = L.tileLayer(
  "https://cyberjapandata.gsi.go.jp/xyz/std/{z}/{x}/{y}.png",
  {
    attribution: "地理院タイル（標準）",
    maxZoom: 30,
    maxNativeZoom: 18
  }
);

const layerOSM = L.tileLayer(
  "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
  {
    attribution: "© OpenStreetMap contributors",
    maxZoom: 30,
    maxNativeZoom: 18
  }
);

const layerGSIort = L.tileLayer(
  "https://cyberjapandata.gsi.go.jp/xyz/ort/{z}/{x}/{y}.jpg",
  {
    attribution: "地理院タイル（空中写真）",
    maxZoom: 30,
    maxNativeZoom: 18
  }
);


/* ===== 初期表示レイヤーを HTML 側の設定で切り替える ===== */

// ベースレイヤー選択
let baseLayer = layerGSIstd;  // デフォルト

if (window.defaultBaseLayer === "osm") baseLayer = layerOSM;
if (window.defaultBaseLayer === "ort") baseLayer = layerGSIort;

// 初期レイヤー配列（ベースレイヤーは必ず1つ）
let initialLayers = [baseLayer];

// オーバーレイ（複数対応可能）
if (window.defaultOverlayCS === true) initialLayers.push(layerCSmap50);

/* ===== 地図初期化（★初期位置を石川県庁、ズーム9に変更） ===== */
const map = L.map("map", {
  center: [36.594553, 136.625639],   // ★ 石川県庁
  zoom: 8,                            // ★ 石川県
  maxZoom: 30,
  layers: initialLayers
});
// ★ 初期レイアウト確定後に Leaflet のサイズを再計算（安全）
setTimeout(() => {
  map.invalidateSize();
}, 200);

/* ===== レイヤーコントロール ===== */
window.layerControl = L.control.layers(
  {
    "地理院地図（標準）": layerGSIstd,
    "OpenStreetMap": layerOSM,
    "地理院空中写真": layerGSIort,
  },
  {},   // ★ オーバーレイは空で作る
  { position: "topright" }
).addTo(map);
</script>  

  <!-- 既存ロジック（地図 → 統計 → 写真） -->
<script src="rasterLayers.js"></script>      <!-- ラスタ -->
<script src="treespecies.js"></script>       <!-- 樹種2024 -->
<script src="handoku.js"></script>           <!-- 判読図 -->
<script src="mesh7.js"></script>

</body>
</html>
